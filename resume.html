<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Resume — Nagesh A.S</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--orange:#FF6D29;--ink:#161316;--ink2:#0B0809;--gray:#BABABA;--glass:rgba(255,255,255,.06);--bd:rgba(255,255,255,.14)}
body{font-family:'Inter',sans-serif;background:var(--ink2);color:#fff;min-height:100vh;padding:40px 20px}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(circle at 20% 10%,rgba(255,109,41,.18),transparent 60%),radial-gradient(circle at 80% 90%,rgba(69,48,39,.4),transparent 60%);pointer-events:none}
.wrap{max-width:880px;margin:0 auto;position:relative;z-index:1;padding:48px;background:var(--glass);border:1px solid var(--bd);border-radius:24px;backdrop-filter:blur(16px);box-shadow:0 30px 80px rgba(0,0,0,.5)}
.back{display:inline-flex;align-items:center;gap:8px;color:var(--gray);text-decoration:none;font-size:.85rem;margin-bottom:24px;padding:8px 14px;border-radius:999px;background:var(--glass);border:1px solid var(--bd);transition:all .25s}
.back:hover{color:#fff;background:rgba(255,255,255,.1);border-color:var(--orange)}
h1{font-family:'Space Grotesk',sans-serif;font-size:2.4rem;letter-spacing:-.03em;margin-bottom:6px}
h1 span{background:linear-gradient(135deg,var(--orange),#FF8A52);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{color:var(--gray);font-size:1rem;margin-bottom:28px}
hr{border:0;border-top:1px solid var(--bd);margin:28px 0}
.empty{padding:60px 0;text-align:center;color:var(--gray)}
.empty p{margin-bottom:8px}
* {
  -webkit-tap-highlight-color: transparent; /* remove blue touch */
  -webkit-user-select: none; /* Safari */
  user-select: none; /* disable text selection */
  -webkit-touch-callout: none; /* disable long-press menu (copy/save) */
}

button, a {
  outline: none;
  -webkit-tap-highlight-color: transparent;
}
</style>
</head>
<body>
<div class="bg"></div>
<div class="wrap">
  <a href="index.html" class="back">← Back to portfolio</a>
  <h1><span>Resume</span></h1>
  <div class="sub">Nagesh A.S · Aspiring Developer · Kollam, Kerala</div>
  <hr/>
  <div class="empty">
    <p>Work in Progress.</p>
    <p style="font-size:.85rem;opacity:.7">My resume is currently being prepared and will be available soon.<br/>taking the time to make sure every detail is accurate, professional,<br/>reflects my best work.    Thankyou for your understanding.</p>
  </div>
</div>
</body>
</html>
